<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Atendimento</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">


<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* FUNDO BRANCO */
body {
    background: #ffffff;
    color: #1e3a8a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 1000px;
    text-align: center;
}

/* HEADER AZUL */
.header {
    margin-bottom: 40px;
    padding: 20px;
    background: #2563eb;
    border-radius: 15px;
    color: white;
}

/* LOGO */
.logo {
    font-size: 3rem;
    color: #93c5fd;
}

/* TÍTULO */
h1 {
    color: white;
}

/* INFO WHATS */
.whatsapp-info {
    background: #1e40af;
    padding: 10px;
    border-radius: 10px;
    color: white;
    margin-top: 10px;
}

/* GRID */
.buttons-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* BOTÕES AZUL CLARO */
.service-button {
    background: #93c5fd;
    border-radius: 15px;
    padding: 25px;
    color: #1e3a8a;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

/* HOVER */
.service-button:hover {
    background: #60a5fa;
    color: white;
}

/* ÍCONES */
.button-icon {
    font-size: 2.5rem;
    margin-bottom: 10px;
    color: #1e3a8a;
}

/* FOOTER AZUL */
.footer {
    margin-top: 30px;
    background: #2563eb;
    padding: 20px;
    border-radius: 10px;
    color: white;
}

/* LINKS */
.footer-link {
    color: #bfdbfe;
    text-decoration: none;
    margin: 10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo"><i class="fas fa-headset"></i></div>
<h1>Central de Atendimento</h1>

<div class="whatsapp-info">
<i class="fab fa-whatsapp"></i> Atendimento via WhatsApp
</div>
</div>

<div class="buttons-container">

<a href="https://wa.me/551154441502" class="service-button">
<div class="button-icon"><i class="fas fa-user-friends"></i></div>
ATENDIMENTO HUMANO
</a>

<a href="https://wa.me/551154441502" class="service-button">
<div class="button-icon"><i class="fas fa-user-cog"></i></div>
ATIVAR TAG
</a>

<a href="https://wa.me/551154441502" class="service-button">
<div class="button-icon"><i class="fas fa-file-invoice-dollar"></i></div>
2ª VIA DE CONTAS
</a>

<a href="https://wa.me/551154441502" class="service-button">
<div class="button-icon"><i class="fas fa-satellite-dish"></i></div>
PROBLEMAS COM PAGAMENTO
</a>

<a href="https://wa.me/551154441502" class="service-button">
<div class="button-icon"><i class="fas fa-concierge-bell"></i></div>
OUTROS SERVIÇOS
</a>

</div>

<div class="footer">
<p>© 2026 Central de Atendimento</p>

<a href="tel:5511954441502" class="footer-link">
<i class="fas fa-phone"></i> Ligar
</a>

<a href="https://wa.me/551154441502" class="footer-link">
<i class="fab fa-whatsapp"></i> WhatsApp
</a>
</div>

</div>

</body>
</html>
